name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v0.1.0

jobs:
  build-and-release:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: sway-draw-linux-x86_64
          # Note: Static MUSL builds with Wayland/X11 dependencies are complex.
          # Stick to GNU for now as it matches Fedora's environment.

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libxkbcommon-dev \
          libwayland-dev \
          libdbus-1-dev \
          rpm

    - name: Build Binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Prepare Release Assets
      run: |
        mkdir -p dist
        # Copy the actual binary name from Cargo.toml
        cp target/${{ matrix.target }}/release/sway-draw dist/
        cp README.md LICENSE dist/ || true
        tar -czf ${{ matrix.asset_name }}.tar.gz -C dist .

    - name: Generate Checksum
      run: sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.asset_name }}.tar.gz
          ${{ matrix.asset_name }}.sha256
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
