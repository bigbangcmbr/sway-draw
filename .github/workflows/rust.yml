name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.1

jobs:
  build-and-release:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: mytool-linux-x86_64
          - target: x86_64-unknown-linux-musl
            asset_name: mytool-linux-musl-static

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install dependencies (for RPM and MUSL)
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools rpm

    - name: Build Binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Archive
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/mytool dist/
        cp README.md LICENSE dist/
        tar -czf ${{ matrix.asset_name }}.tar.gz -C dist .

    - name: Generate SHA-256 Checksum
      run: sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.sha256

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.asset_name }}.tar.gz
          ${{ matrix.asset_name }}.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
